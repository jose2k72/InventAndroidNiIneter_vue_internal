<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 128 128"
  fill="none"
  stroke-linecap="round"
  stroke-linejoin="round"
>

  <!-- Clipboard body -->
  <rect
    x="28"
    y="22"
    width="72"
    height="92"
    rx="6"
    fill="#FFFFFF"
    stroke="#1F2933"
    stroke-width="4"
  />

  <!-- Clipboard clip base -->
  <rect
    x="44"
    y="10"
    width="40"
    height="18"
    rx="4"
    fill="#E5E7EB"
    stroke="#1F2933"
    stroke-width="3"
  />

  <!-- Clipboard clip top -->
  <rect
    x="50"
    y="6"
    width="28"
    height="10"
    rx="3"
    fill="#2F5D8C"
    stroke="#1F2933"
    stroke-width="3"
  />

  <!-- Inner map frame -->
  <rect
    x="36"
    y="40"
    width="56"
    height="60"
    rx="2"
    fill="#F8FAFC"
    stroke="#CBD5E1"
    stroke-width="2"
  />

  <!-- Cartographic grid -->
  <line x1="36" y1="60" x2="92" y2="60" stroke="#CBD5E1" stroke-width="2"/>
  <line x1="36" y1="80" x2="92" y2="80" stroke="#CBD5E1" stroke-width="2"/>
  <line x1="56" y1="40" x2="56" y2="100" stroke="#CBD5E1" stroke-width="2"/>
  <line x1="72" y1="40" x2="72" y2="100" stroke="#CBD5E1" stroke-width="2"/>

  <!-- Parcel polygon (cadastral) -->
  <path
    d="M46 86 L58 66 L78 70 L82 90 L60 94 Z"
    fill="#5FB3A2"
    stroke="#2F5D8C"
    stroke-width="3"
  />

</svg>
